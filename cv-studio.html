<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV Studio — Construtor de Currículos</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<style>
  :root{ --accent:#149da4; --font:"Segoe UI",Arial,sans-serif; --ink:#222; --muted:#8a8a8a; --rule:#e3e3e3;
         --ui:#0f172a; --ui2:#1e293b; --line:#e2e8f0; --bg:#eef1f3; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; font-family:"Segoe UI",Arial,sans-serif; color:#1e293b; background:var(--bg); }
  button{ font-family:inherit; }
  .app{ display:flex; flex-direction:column; height:100vh; }
  /* ---------- Top bar ---------- */
  .top{ background:#0f172a; color:#e2e8f0; padding:0 16px; height:54px; display:flex; align-items:center; gap:14px; flex:0 0 auto; }
  .top .logo{ font-weight:800; font-size:16px; letter-spacing:.3px; }
  .top .logo b{ color:#34d8df; }
  .top .sp{ flex:1; }
  .top label{ font-size:10px; text-transform:uppercase; letter-spacing:.5px; color:#94a3b8; margin-right:5px; }
  .top select,.top input[type=password]{ height:32px; border-radius:6px; border:1px solid #334155; background:#1e293b; color:#e2e8f0; padding:0 8px; font-size:12px; }
  .top input[type=password]{ width:200px; }
  .tbtn{ height:34px; border:1px solid #334155; background:#1e293b; color:#e2e8f0; border-radius:7px; padding:0 13px; font-size:13px; font-weight:600; cursor:pointer; display:inline-flex; align-items:center; gap:6px; }
  .tbtn:hover{ background:#293548; }
  .tbtn.pri{ background:var(--accent); border-color:var(--accent); color:#fff; }
  .tbtn.pri:hover{ filter:brightness(1.07); }
  .tbtn:disabled{ opacity:.5; cursor:not-allowed; }
  /* ---------- Main split ---------- */
  .main{ flex:1; display:flex; min-height:0; }
  .editor{ width:430px; flex:0 0 430px; background:#fff; border-right:1px solid var(--line); overflow-y:auto; padding:16px; }
  .preview{ flex:1; overflow:auto; background:#dde3e7; padding:24px; display:flex; justify-content:center; align-items:flex-start; }
  /* ---------- Editor ---------- */
  .ed-h{ font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.7px; color:#64748b; margin:18px 0 8px; display:flex; align-items:center; gap:8px; }
  .ed-h:first-child{ margin-top:0; }
  .fld{ margin-bottom:9px; }
  .fld label{ display:block; font-size:11px; color:#64748b; margin-bottom:3px; font-weight:600; }
  .fld input,.fld textarea,.fld select{ width:100%; border:1px solid #cbd5e1; border-radius:7px; padding:7px 9px; font-size:13px; font-family:inherit; background:#fff; }
  .fld textarea{ resize:vertical; min-height:62px; line-height:1.45; }
  .fld input:focus,.fld textarea:focus,.fld select:focus{ outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(20,157,164,.13); }
  .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:9px; }
  .card{ border:1px solid var(--line); border-radius:10px; margin-bottom:12px; background:#fff; }
  .card>.hd{ display:flex; align-items:center; gap:6px; padding:9px 11px; cursor:grab; border-bottom:1px solid var(--line); background:#f8fafc; border-radius:10px 10px 0 0; }
  .card>.hd .ttl{ flex:1; font-weight:700; font-size:13px; border:none; background:transparent; padding:2px 4px; }
  .card>.hd .ttl:focus{ outline:none; background:#fff; border-radius:5px; }
  .ic{ width:26px; height:26px; border:1px solid var(--line); background:#fff; border-radius:6px; cursor:pointer; font-size:13px; color:#475569; display:inline-flex; align-items:center; justify-content:center; }
  .ic:hover{ background:#f1f5f9; color:#0f172a; }
  .ic.dz{ color:#dc2626; }
  .card>.bd{ padding:11px; }
  .item{ border:1px dashed #d8dee6; border-radius:8px; padding:9px; margin-bottom:9px; position:relative; }
  .item .ihd{ display:flex; justify-content:flex-end; gap:5px; margin-bottom:5px; }
  .add{ width:100%; border:1px dashed #b6c0cb; background:#f8fafc; color:#475569; border-radius:8px; padding:8px; font-size:12px; cursor:pointer; font-weight:600; }
  .add:hover{ border-color:var(--accent); color:var(--accent); }
  .ai{ border:1px solid var(--accent); color:var(--accent); background:#fff; border-radius:6px; font-size:11px; padding:3px 8px; cursor:pointer; font-weight:600; display:inline-flex; align-items:center; gap:4px; }
  .ai:hover{ background:#f0fbfb; }
  .ai:disabled{ opacity:.5; cursor:wait; }
  .addsec{ position:relative; }
  .addsec .menu{ display:none; position:absolute; left:0; right:0; bottom:42px; background:#fff; border:1px solid var(--line); border-radius:10px; box-shadow:0 8px 24px rgba(0,0,0,.12); padding:6px; z-index:5; }
  .addsec.open .menu{ display:block; }
  .addsec .menu button{ display:block; width:100%; text-align:left; border:none; background:none; padding:8px 10px; border-radius:6px; font-size:13px; cursor:pointer; }
  .addsec .menu button:hover{ background:#f1f5f9; }
  /* swatches */
  .swatches{ display:flex; gap:6px; flex-wrap:wrap; }
  .sw{ width:22px; height:22px; border-radius:50%; cursor:pointer; border:2px solid #fff; box-shadow:0 0 0 1px #cbd5e1; }
  .sw.on{ box-shadow:0 0 0 2px #0f172a; }
  .tmpls{ display:flex; gap:8px; }
  .tmpl{ flex:1; border:2px solid var(--line); border-radius:8px; padding:7px; cursor:pointer; font-size:11px; font-weight:700; text-align:center; color:#475569; background:#fff; }
  .tmpl.on{ border-color:var(--accent); color:var(--accent); }
  .colbtn{ font-size:10px; }
  .chips-help{ font-size:10px; color:#94a3b8; margin-top:-4px; margin-bottom:8px; }
  /* ATS panel */
  .ats{ border:1px solid var(--line); border-radius:10px; padding:12px; background:#fff; }
  .ats .score{ display:flex; align-items:center; gap:12px; margin-bottom:10px; }
  .ring{ width:54px; height:54px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:17px; color:#fff; flex:0 0 auto; }
  .ats ul{ margin:0; padding:0; list-style:none; }
  .ats li{ font-size:12px; padding:4px 0; display:flex; gap:7px; align-items:flex-start; }
  .ats li .mk{ flex:0 0 auto; font-weight:800; }
  .ats li.ok .mk{ color:#16a34a; } .ats li.no .mk{ color:#dc2626; } .ats li.warn .mk{ color:#d97706; }
  .toast{ position:fixed; bottom:18px; left:50%; transform:translateX(-50%); background:#0f172a; color:#fff; padding:10px 16px; border-radius:8px; font-size:13px; opacity:0; transition:.25s; pointer-events:none; z-index:50; }
  .toast.show{ opacity:1; }
  .spin{ width:13px; height:13px; border:2px solid currentColor; border-top-color:transparent; border-radius:50%; display:inline-block; animation:sp .7s linear infinite; }
  @keyframes sp{ to{ transform:rotate(360deg);} }
  /* ===================== RESUME PAGE ===================== */
  .pagewrap{ transform-origin:top center; }
  .page{ width:210mm; min-height:297mm; background:#fff; box-shadow:0 3px 22px rgba(0,0,0,.16); font-family:var(--font); color:var(--ink); }
  .page *{ box-sizing:border-box; }
  .page .pad{ padding:46px 42px; }
  .r-name{ font-size:30px; font-weight:800; letter-spacing:.4px; line-height:1.05; }
  .r-head{ color:var(--accent); font-weight:700; font-size:13.5px; margin-top:6px; }
  .r-contact{ display:flex; flex-wrap:wrap; gap:7px 15px; margin-top:9px; font-size:10.5px; color:#555; }
  .r-contact span{ display:inline-flex; align-items:center; gap:5px; }
  .r-contact svg{ width:11px; height:11px; fill:var(--accent); flex:0 0 auto; }
  .photo{ width:78px; height:78px; border-radius:50%; flex:0 0 auto; object-fit:cover; background:var(--accent); color:#fff; display:flex; align-items:center; justify-content:center; font-size:27px; font-weight:700; }
  .sec-ttl{ font-size:13px; font-weight:800; text-transform:uppercase; letter-spacing:.8px; margin:0 0 10px; }
  .blk{ margin-bottom:15px; break-inside:avoid; }
  .blk:last-child{ margin-bottom:0; }
  .entry{ margin-bottom:11px; break-inside:avoid; }
  .entry:last-child{ margin-bottom:0; }
  .e-t{ font-size:13px; font-weight:700; }
  .e-o{ color:var(--accent); font-weight:600; font-size:12px; margin-top:1px; }
  .e-m{ display:flex; flex-wrap:wrap; gap:13px; margin-top:4px; font-size:10.5px; color:var(--muted); }
  .e-m span{ display:inline-flex; align-items:center; gap:4px; }
  .e-m svg{ width:10px; height:10px; fill:var(--muted); flex:0 0 auto; }
  .e-d{ font-size:11px; color:#444; line-height:1.5; margin-top:5px; }
  .e-d ul{ margin:4px 0 0; padding-left:16px; }
  .e-d li{ margin-bottom:2px; }
  .r-summary{ font-size:11.5px; line-height:1.55; color:#444; text-align:justify; }
  .chips{ display:flex; flex-wrap:wrap; gap:6px; }
  .chip{ font-size:10.5px; border-radius:4px; padding:3px 9px; }
  .lng{ margin-bottom:8px; } .lng:last-child{ margin-bottom:0; }
  .lng .row{ display:flex; justify-content:space-between; align-items:center; }
  .lng .n{ font-size:11.5px; font-weight:600; } .lng .lv{ font-size:9.5px; color:var(--muted); }
  .dots{ display:flex; gap:3px; } .dot{ width:8px; height:8px; border-radius:50%; background:#dfe3e6; } .dot.on{ background:var(--accent); }
  .ach{ margin-bottom:9px; } .ach:last-child{ margin-bottom:0; }
  .ach .t{ font-size:11.5px; font-weight:700; } .ach .d{ font-size:10.5px; color:#666; line-height:1.45; margin-top:1px; }
  /* Template: Executivo (2-col) */
  .t-exec .pad{ display:flex; flex-direction:column; }
  .t-exec .hdr{ display:flex; justify-content:space-between; align-items:flex-start; gap:16px; }
  .t-exec .cols{ display:flex; gap:22px; margin-top:20px; }
  .t-exec .main{ flex:0 0 58%; max-width:58%; }
  .t-exec .side{ flex:1; min-width:0; }
  .t-exec .sec-ttl{ border-bottom:1.5px solid var(--ink); padding-bottom:5px; }
  .t-exec .side .sec-ttl{ border-bottom-color:var(--accent); }
  /* Template: Clássico (1-col) */
  .t-classic .hdr{ text-align:center; border-bottom:2px solid var(--accent); padding-bottom:12px; }
  .t-classic .r-contact{ justify-content:center; }
  .t-classic .cols{ margin-top:16px; }
  .t-classic .sec-ttl{ border-bottom:1px solid var(--rule); padding-bottom:4px; color:var(--accent); }
  /* Template: Moderno (header band) */
  .t-modern .pad{ padding:0; }
  .t-modern .band{ background:var(--accent); color:#fff; padding:30px 42px; display:flex; justify-content:space-between; align-items:center; gap:16px; }
  .t-modern .band .r-name{ color:#fff; } .t-modern .band .r-head{ color:rgba(255,255,255,.92); }
  .t-modern .band .r-contact{ color:rgba(255,255,255,.92); } .t-modern .band .r-contact svg{ fill:#fff; }
  .t-modern .band .photo{ background:rgba(255,255,255,.25); }
  .t-modern .cols{ padding:26px 42px; }
  .t-modern .sec-ttl{ color:var(--accent); border-left:3px solid var(--accent); padding-left:8px; }
  /* ===================== PRINT ===================== */
  @page{ size:A4; margin:11mm; }
  @media print{
    .top,.editor,.toast{ display:none !important; }
    .app,.main,.preview{ display:block; height:auto; overflow:visible; }
    .preview{ padding:0; background:#fff; }
    .pagewrap{ transform:none !important; }
    .page{ width:auto; min-height:auto; box-shadow:none; }
    .t-exec .pad,.t-classic .pad{ padding:0; }
    .t-modern .band{ padding:22px 0; } .t-modern .cols{ padding:18px 0 0; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <div class="logo">CV<b>Studio</b></div>
    <button class="tbtn" id="importBtn">⤴ Importar PDF/Word</button>
    <input id="file" type="file" accept=".pdf,.doc,.docx" hidden>
    <div class="sp"></div>
    <label>IA</label><input id="key" type="password" placeholder="chave Anthropic (sk-ant-…)" autocomplete="off">
    <select id="lang" title="Idioma da IA">
      <option>Português</option><option>Inglês</option><option>Espanhol</option>
    </select>
    <button class="tbtn pri" id="dlBtn">⬇ Baixar PDF</button>
  </div>
  <div class="main">
    <div class="editor" id="editor"></div>
    <div class="preview"><div class="pagewrap" id="pagewrap"></div></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
"use strict";
const $ = id => document.getElementById(id);
const MODEL = 'claude-opus-4-8';
const pdfjs = window['pdfjsLib'];
if(pdfjs) pdfjs.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

/* ---------------- Icons ---------------- */
const I={
 cal:'<svg viewBox="0 0 24 24"><path d="M7 2v2H5a2 2 0 00-2 2v13a2 2 0 002 2h14a2 2 0 002-2V6a2 2 0 00-2-2h-2V2h-2v2H9V2H7zM5 9h14v10H5z"/></svg>',
 pin:'<svg viewBox="0 0 24 24"><path d="M12 2C8.1 2 5 5.1 5 9c0 5.2 7 13 7 13s7-7.8 7-13c0-3.9-3.1-7-7-7zm0 9.5A2.5 2.5 0 1112 6.5a2.5 2.5 0 010 5z"/></svg>',
 ph:'<svg viewBox="0 0 24 24"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.5.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.2.2 2.4.6 3.5.1.4 0 .8-.3 1l-2.2 2.3z"/></svg>',
 mail:'<svg viewBox="0 0 24 24"><path d="M3 5h18c.6 0 1 .4 1 1v12c0 .6-.4 1-1 1H3c-.6 0-1-.4-1-1V6c0-.6.4-1 1-1zm9 7L4 7v1l8 5 8-5V7z"/></svg>',
 link:'<svg viewBox="0 0 24 24"><path d="M4.98 3.5C4.98 4.9 3.9 6 2.5 6S0 4.9 0 3.5 1.1 1 2.5 1s2.48 1.1 2.48 2.5zM.2 8h4.6v14H.2zm7.5 0h4.4v1.9h.06c.6-1.1 2.1-2.3 4.3-2.3 4.6 0 5.5 3 5.5 6.9V22h-4.6v-6.6c0-1.6 0-3.6-2.2-3.6s-2.5 1.7-2.5 3.5V22H7.7z"/></svg>',
 web:'<svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zm6.9 6h-2.8a15.7 15.7 0 00-1.3-3.4A8 8 0 0118.9 8zM12 4c.8 1.1 1.4 2.5 1.8 4h-3.6c.4-1.5 1-2.9 1.8-4zM4.3 14a7.9 7.9 0 010-4h3.2a17 17 0 000 4zm.8 2h2.8c.3 1.2.8 2.4 1.3 3.4A8 8 0 015.1 16zm2.8-8H5.1a8 8 0 014.1-3.4A15.7 15.7 0 007.9 8zM12 20c-.8-1.1-1.4-2.5-1.8-4h3.6c-.4 1.5-1 2.9-1.8 4zm2.2-6H9.8a15 15 0 010-4h4.4a15 15 0 010 4zm.6 5.4c.5-1 1-2.2 1.3-3.4h2.8a8 8 0 01-4.1 3.4zM16.5 14a17 17 0 000-4h3.2a7.9 7.9 0 010 4z"/></svg>'
};

/* ---------------- Section model ---------------- */
const TYPES={
 experience:{name:'Experiência', side:false, kind:'entries'},
 education:{name:'Educação', side:false, kind:'entries'},
 projects:{name:'Projetos', side:false, kind:'entries'},
 custom:{name:'Seção personalizada', side:false, kind:'entries'},
 achievements:{name:'Conquistas-Chave', side:true, kind:'ach'},
 skills:{name:'Competências', side:true, kind:'skills'},
 languages:{name:'Idiomas', side:true, kind:'langs'},
 awards:{name:'Prêmios', side:true, kind:'entries'}
};
const LEVELS=['Nativo','Fluente','Avançado','Intermediário','Básico'];
const ACCENTS=['#149da4','#2563eb','#7c3aed','#db2777','#dc2626','#0f766e','#b45309','#0f172a'];
const FONTS={'Segoe UI':"'Segoe UI',Arial,sans-serif",'Georgia':"Georgia,'Times New Roman',serif",'Calibri':"Calibri,'Segoe UI',sans-serif",'Arial':"Arial,Helvetica,sans-serif"};
const TEMPLATES={exec:'Executivo',classic:'Clássico',modern:'Moderno'};

let uid=1; const nid=()=> 's'+(uid++);

function blankItem(type){
 const k=TYPES[type].kind;
 if(k==='skills') return 'Nova competência';
 if(k==='langs') return {idioma:'Idioma',nivel:'Avançado'};
 if(k==='ach') return {titulo:'Conquista',descricao:'Descrição do resultado, com números quando possível.'};
 return {cargo:'',empresa:'',periodo:'',local:'',descricao:''};
}
function newSection(type){
 const meta=TYPES[type];
 return {id:nid(),type, title:meta.name, col: meta.side?'side':'main', items:[blankItem(type)]};
}

/* ---------------- Default state ---------------- */
function demo(){
 return {
  basics:{name:'Luiz Coutinho',headline:'CEO na Brandvakt | CFO · Finanças',location:'Täby, Suécia',
    phone:'',email:'',linkedin:'linkedin.com/in/luiz-c-1401a321',website:'',photo:'',
    summary:'Executivo C-level com mais de 25 anos em finanças e gestão, atualmente CEO da Brandvakt. Trajetória em CFO, Diretor Financeiro e liderança de vendas globais, com atuação no Brasil, Angola e Suécia. Histórico de crescimento de receita, otimização de custos e expansão internacional.'},
  template:'exec', accent:'#149da4', font:'Segoe UI',
  sections:[
   {id:nid(),type:'experience',title:'Experiência',col:'main',items:[
     {cargo:'CEO do Grupo',empresa:'Brandvakt',periodo:'abr/2023 – Presente',local:'',descricao:'Lidero a estratégia global de uma empresa de tecnologia em segurança digital.\nExpansão da rede de vendas para 15 novos países em 2023.'},
     {cargo:'Chief Financial Officer (CFO)',empresa:'YD | Investment Capital',periodo:'ago/2014 – Presente',local:'São Paulo, Brasil',descricao:'Gestão financeira e de investimentos (Venture Capital).'}
   ]},
   {id:nid(),type:'education',title:'Educação',col:'main',items:[
     {cargo:'Engenharia Econômica e Financeira',empresa:'Universidade Federal Fluminense',periodo:'2004 – 2006',local:'',descricao:''}
   ]},
   {id:nid(),type:'achievements',title:'Conquistas-Chave',col:'side',items:[
     {titulo:'Crescimento de Receita',descricao:'+20% na receita anual em 2023.'},
     {titulo:'Otimização de Custos',descricao:'-30% nos custos operacionais até 2022.'}
   ]},
   {id:nid(),type:'skills',title:'Competências',col:'side',items:['Gestão Financeira','M&A','Planejamento Estratégico','Liderança','Expansão Internacional']},
   {id:nid(),type:'languages',title:'Idiomas',col:'side',items:[{idioma:'Português',nivel:'Nativo'},{idioma:'Inglês',nivel:'Fluente'}]}
  ]
 };
}

let S = load() || demo();

/* ---------------- Persistence ---------------- */
function save(){ try{ localStorage.setItem('cvstudio', JSON.stringify(S)); }catch(e){} }
function load(){ try{ const r=localStorage.getItem('cvstudio'); if(!r) return null; const o=JSON.parse(r); (o.sections||[]).forEach(s=>{}); return o; }catch(e){ return null; } }
$('key').value = localStorage.getItem('anthropicKey')||'';
$('key').addEventListener('input',()=>localStorage.setItem('anthropicKey',$('key').value.trim()));

/* ---------------- Helpers ---------------- */
const esc=s=>(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function toast(m){ const t=$('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2600); }
function initials(n){ const p=(n||'').trim().split(/\s+/).filter(Boolean); return p.length?((p[0][0]||'')+(p.length>1?p[p.length-1][0]:'')).toUpperCase():'CV'; }
function bullets(d){ if(!d) return ''; const ls=String(d).split(/\n+/).map(x=>x.trim()).filter(Boolean);
 if(ls.length>1) return '<ul>'+ls.map(l=>'<li>'+esc(l)+'</li>').join('')+'</ul>';
 return '<div>'+esc(ls[0]||'')+'</div>'; }
function levelN(lv){ const m={'nativo':5,'fluente':5,'avançado':4,'avancado':4,'intermediário':3,'intermediario':3,'básico':2,'basico':2}; return m[(lv||'').toLowerCase().trim()]||4; }

/* =========================================================
   EDITOR
========================================================= */
function renderEditor(){
 const b=S.basics;
 let h='';
 /* Design */
 h+='<div class="ed-h">Design</div>';
 h+='<div class="fld"><label>Template</label><div class="tmpls">'+
    Object.keys(TEMPLATES).map(k=>`<div class="tmpl ${S.template===k?'on':''}" data-tmpl="${k}">${TEMPLATES[k]}</div>`).join('')+'</div></div>';
 h+='<div class="grid2">';
 h+='<div class="fld"><label>Cor de destaque</label><div class="swatches">'+
    ACCENTS.map(c=>`<div class="sw ${S.accent===c?'on':''}" data-acc="${c}" style="background:${c}"></div>`).join('')+'</div></div>';
 h+='<div class="fld"><label>Fonte</label><select id="fontSel">'+Object.keys(FONTS).map(f=>`<option ${S.font===f?'selected':''}>${f}</option>`).join('')+'</select></div>';
 h+='</div>';

 /* Basics */
 h+='<div class="ed-h">Dados pessoais</div>';
 h+=`<div class="grid2">
   <div class="fld"><label>Nome</label><input data-b="name" value="${esc(b.name)}"></div>

function sectionCard(sec,si){
 const meta=TYPES[sec.type];
 let h=`<div class="card" data-sec="${si}" draggable="true">`;
 h+=`<div class="hd" data-drag="${si}">☰
    <input class="ttl" data-sectitle="${si}" value="${esc(sec.title)}">`;
 if(S.template==='exec') h+=`<button class="ic colbtn" data-col="${si}" title="Coluna">${sec.col==='side'?'▥':'▤'}</button>`;
 h+=`<button class="ic" data-mvsec="${si}|-1" title="Subir">↑</button>
     <button class="ic" data-mvsec="${si}|1" title="Descer">↓</button>
     <button class="ic dz" data-delsec="${si}" title="Excluir">✕</button></div><div class="bd">`;

 sec.items.forEach((it,ii)=>{ h+=itemEditor(sec,si,it,ii,meta.kind); });
 h+=`<button class="add" data-additem="${si}">+ Adicionar item</button>`;
 h+='</div></div>';
 return h;
}

function itemEditor(sec,si,it,ii,kind){
 const ctl=`<div class="ihd">
   <button class="ic" data-mvitem="${si}|${ii}|-1">↑</button>
   <button class="ic" data-mvitem="${si}|${ii}|1">↓</button>
   <button class="ic dz" data-delitem="${si}|${ii}">✕</button></div>`;
 if(kind==='skills'){
   return `<div class="item">${ctl}<input data-it="${si}|${ii}|" value="${esc(it)}"></div>`;
 }
 if(kind==='langs'){
   return `<div class="item">${ctl}<div class="grid2">
     <div class="fld" style="margin:0"><input data-it="${si}|${ii}|idioma" value="${esc(it.idioma)}" placeholder="Idioma"></div>
     <div class="fld" style="margin:0"><select data-it="${si}|${ii}|nivel">${LEVELS.map(l=>`<option ${it.nivel===l?'selected':''}>${l}</option>`).join('')}</select></div>
   </div></div>`;
 }
 if(kind==='ach'){
   return `<div class="item">${ctl}
     <div class="fld" style="margin-bottom:6px"><input data-it="${si}|${ii}|titulo" value="${esc(it.titulo)}" placeholder="Título"></div>
     <div class="fld" style="margin:0"><textarea data-it="${si}|${ii}|descricao" style="min-height:44px">${esc(it.descricao)}</textarea></div></div>`;
 }
 /* entries */
 return `<div class="item">${ctl}
   <div class="grid2">
     <div class="fld" style="margin-bottom:6px"><input data-it="${si}|${ii}|cargo" value="${esc(it.cargo)}" placeholder="Cargo / Título"></div>
     <div class="fld" style="margin-bottom:6px"><input data-it="${si}|${ii}|empresa" value="${esc(it.empresa)}" placeholder="Empresa / Instituição"></div>
     <div class="fld" style="margin-bottom:6px"><input data-it="${si}|${ii}|periodo" value="${esc(it.periodo)}" placeholder="Período"></div>
     <div class="fld" style="margin-bottom:6px"><input data-it="${si}|${ii}|local" value="${esc(it.local)}" placeholder="Local"></div>
   </div>
   <div class="fld" style="margin:0"><label style="display:flex;justify-content:space-between">Descrição / bullets (uma por linha)
     <button class="ai" data-ai="item|${si}|${ii}">✦ Melhorar</button></label>
     <textarea data-it="${si}|${ii}|descricao">${esc(it.descricao)}</textarea></div></div>`;
}

 if(t.dataset.additem!==undefined){ const s=S.sections[+t.dataset.additem]; s.items.push(blankItem(s.type)); renderEditor(); renderPreview(); save(); return; }
 if(t.dataset.mvitem!==undefined){ const [si,ii,d]=t.dataset.mvitem.split('|').map(Number); moveArr(S.sections[si].items,ii,ii+d); renderEditor(); renderPreview(); save(); return; }
 if(t.dataset.delitem!==undefined){ const [si,ii]=t.dataset.delitem.split('|').map(Number); S.sections[si].items.splice(ii,1); renderEditor(); renderPreview(); save(); return; }

/* =========================================================
   ATS SCORE (heuristic)
========================================================= */
const ACTION_VERBS=['lidere','liderei','gerenciei','geri','aumentei','reduzi','implementei','desenvolvi','criei','coordenei','dirigi','negociei','otimizei','expandi','conduzi','estruturei','elevei','entreguei','transformei','lancei','construí','planejei','executei','superei','alcancei','led','managed','increased','reduced','built','launched','delivered','drove','achieved','improved','created'];
function renderATS(){
 const box=$('atsBox'); if(!box) return;
 const b=S.basics; const checks=[]; let score=0;
 const add=(cond,pts,okMsg,noMsg,warn)=>{ if(cond){score+=pts; checks.push({c:'ok',m:okMsg});} else checks.push({c:warn?'warn':'no',m:noMsg}); };

 add(!!(b.email||b.phone),12,'Contato (e-mail/telefone) presente','Adicione e-mail ou telefone');
 add(!!b.linkedin,6,'LinkedIn incluído','Inclua seu LinkedIn',true);
 add(!!(b.headline&&b.headline.length>3),8,'Headline/cargo definido','Defina um cargo/headline no topo');
 const sw=(b.summary||'').trim().split(/\s+/).filter(Boolean).length;
 add(sw>=25 && sw<=90,14,`Resumo com bom tamanho (${sw} palavras)`, sw<25?'Resumo curto — mire 30-80 palavras':'Resumo longo — reduza para até ~80 palavras', true);

 const exp=S.sections.find(s=>s.type==='experience');
 const expItems=exp?exp.items:[];
 add(expItems.length>0,12,`${expItems.length} experiência(s) listada(s)`,'Adicione experiências profissionais');

 const allDesc=expItems.map(i=>i.descricao||'').join('\n');
 const hasMetrics=/\d/.test(allDesc)&&/(%|\$|R\$|\d+\s*(anos|países|milh|mil|clientes|pessoas|m²|x))/i.test(allDesc.replace(/\d{4}/g,''))||/%/.test(allDesc);
 add(/%|\d/.test(allDesc),14,'Resultados com números/métricas','Quantifique resultados (use %, valores, volumes)');

 const firstWords=allDesc.split(/\n+/).map(l=>l.trim().split(/\s+/)[0]||'').filter(Boolean).map(w=>w.toLowerCase().replace(/[^a-zà-ú]/g,''));
 const verbHits=firstWords.filter(w=>ACTION_VERBS.includes(w)).length;
 add(firstWords.length>0 && verbHits>=Math.max(1,Math.ceil(firstWords.length*0.4)),12,'Bullets começam com verbos de ação','Comece os bullets com verbos de ação (ex.: Liderei, Aumentei, Reduzi)',true);

 const hasSkills=S.sections.some(s=>s.type==='skills'&&s.items.filter(x=>String(x).trim()).length>=3);
 add(hasSkills,10,'Seção de competências preenchida','Liste ao menos 3 competências-chave');
 const hasEdu=S.sections.some(s=>s.type==='education'&&s.items.length);
 add(hasEdu,6,'Formação incluída','Inclua sua formação',true);
 const totalWords=(JSON.stringify(S).match(/\s/g)||[]).length;
 add(true,6,'Estrutura ATS-friendly (sem tabelas/imagens de texto)','',false);

 score=Math.min(100,Math.round(score));
 const col=score>=80?'#16a34a':score>=55?'#d97706':'#dc2626';
 box.innerHTML=`<div class="ats">
   <div class="score"><div class="ring" style="background:${col}">${score}</div>
     <div style="font-size:12px;color:#475569">Pontuação ATS estimada.<br>Ajuste os itens abaixo para subir.</div></div>
   <ul>${checks.map(c=>`<li class="${c.c}"><span class="mk">${c.c==='ok'?'✓':c.c==='warn'?'!':'✕'}</span><span>${c.m}</span></li>`).join('')}</ul></div>`;
}

async function callClaude(messages, opts={}){
 const key=$('key').value.trim();
 if(!key){ toast('Cole sua chave de API Anthropic no topo.'); throw new Error('no key'); }
 const body={ model:MODEL, max_tokens:opts.max||1024, messages };
 if(opts.tools){ body.tools=opts.tools; body.tool_choice={type:'tool',name:opts.tools[0].name}; }
 const r=await fetch('https://api.anthropic.com/v1/messages',{ method:'POST',
   headers:{'content-type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
   body:JSON.stringify(body) });
 if(!r.ok){ let d=''; try{ d=(await r.json()).error?.message||''; }catch(e){} throw new Error('HTTP '+r.status+(d?' — '+d:'')); }
 return r.json();
}
function btnBusy(btn,on){ if(!btn) return; if(on){ btn._html=btn.innerHTML; btn.innerHTML='<span class="spin"></span>'; btn.disabled=true; } else { btn.innerHTML=btn._html||btn.innerHTML; btn.disabled=false; } }

async function aiAction(action, btn){
 const lang=$('lang').value;
 try{
   btnBusy(btn,true);
   if(action==='summary'){
     const ctx=summarizeResume();
     const data=await callClaude([{role:'user',content:`Com base SOMENTE nestes dados de currículo, escreva um resumo profissional executivo em ${lang}, com 3 a 4 frases, impacto e sem inventar fatos. Responda apenas com o texto do resumo.\n\n${ctx}`}],{max:600});
     const txt=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('').trim();
     if(txt){ S.basics.summary=txt; renderEditor(); renderPreview(); save(); toast('Resumo gerado.'); }
   } else if(action.startsWith('item|')){
     const [,si,ii]=action.split('|'); const it=S.sections[+si].items[+ii];
     const cur=it.descricao||(it.cargo+' '+it.empresa);
     const data=await callClaude([{role:'user',content:`Reescreva esta descrição de experiência em ${lang} como 2 a 4 bullets de impacto, começando com verbos de ação e mantendo os fatos. Não invente números. Devolva um bullet por linha, sem marcadores.\n\nCargo: ${it.cargo} — ${it.empresa}\nDescrição atual: ${cur}`}],{max:500});
     const txt=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('').replace(/^[\-•\s]+/gm,'').trim();
     if(txt){ it.descricao=txt; renderEditor(); renderPreview(); save(); toast('Descrição aprimorada.'); }
   }
 }catch(err){ if(err.message!=='no key') toast('IA: '+err.message); }
 finally{ btnBusy(btn,false); }
}
function summarizeResume(){
 const b=S.basics; let s=`Nome: ${b.name}\nCargo: ${b.headline}\nLocal: ${b.location}\n`;
 S.sections.forEach(sec=>{ s+=`\n[${sec.title}]\n`;
   sec.items.forEach(it=>{ if(typeof it==='string') s+='- '+it+'\n';
     else s+=`- ${it.cargo||it.titulo||it.idioma||''} ${it.empresa||''} ${it.periodo||''} ${it.nivel||''} ${it.descricao||''}`.trim()+'\n'; }); });
 return s;
}

$('importBtn').addEventListener('click',()=>$('file').click());

async function importFile(file){
 if(!$('key').value.trim()){ toast('Cole sua chave de API antes de importar.'); return; }
 toast('Lendo arquivo…');
 const ext=file.name.toLowerCase().split('.').pop();
 let content=[];
 try{
   if(ext==='pdf'){
     const buf=await file.arrayBuffer(); const pdf=await pdfjs.getDocument({data:buf}).promise; let text='';
     for(let i=1;i<=pdf.numPages;i++){ const pg=await pdf.getPage(i); const tc=await pg.getTextContent(); text+=tc.items.map(x=>x.str).join(' ')+'\n'; }
     if(text.replace(/\s/g,'').length>=120){ content=[{type:'text',text:text}]; }
     else { const imgs=[]; const mx=Math.min(pdf.numPages,3);
       for(let i=1;i<=mx;i++){ const pg=await pdf.getPage(i); const vp=pg.getViewport({scale:2}); const cv=document.createElement('canvas'); cv.width=vp.width; cv.height=vp.height; await pg.render({canvasContext:cv.getContext('2d'),viewport:vp}).promise; imgs.push(cv.toDataURL('image/png').split(',')[1]); }
       content=imgs.map(b64=>({type:'image',source:{type:'base64',media_type:'image/png',data:b64}}));
     }
   } else { const buf=await file.arrayBuffer(); const res=await window.mammoth.extractRawText({arrayBuffer:buf}); content=[{type:'text',text:res.value||''}]; }
 }catch(err){ toast('Erro ao ler: '+err.message); return; }

 toast('IA estruturando o currículo…');
 const lang=$('lang').value;
 const instr=`Você é especialista em currículos. Extraia TODAS as informações do currículo a seguir e devolva pela ferramenta. Escreva em ${lang}. NUNCA invente dados; deixe vazio o que não constar. Reescreva descrições com impacto sem alterar fatos.`;
 content.push({type:'text',text:instr});
 try{
   const data=await callClaude([{role:'user',content}],{max:4096,tools:[IMPORT_TOOL]});
   const blk=(data.content||[]).find(b=>b.type==='tool_use');
   if(!blk) throw new Error('sem dados');
   applyImported(blk.input);
   toast('Currículo importado!');
 }catch(err){ toast('IA: '+err.message); }
}
const IMPORT_TOOL={ name:'curriculo', description:'Dados estruturados do currículo.', input_schema:{ type:'object', additionalProperties:false,
 properties:{
   nome:{type:'string'},headline:{type:'string'},localizacao:{type:'string'},telefone:{type:'string'},email:{type:'string'},linkedin:{type:'string'},website:{type:'string'},resumo:{type:'string'},
   experiencias:{type:'array',items:{type:'object',additionalProperties:false,properties:{cargo:{type:'string'},empresa:{type:'string'},periodo:{type:'string'},local:{type:'string'},descricao:{type:'string'}},required:['cargo','empresa','periodo','local','descricao']}},
   educacao:{type:'array',items:{type:'object',additionalProperties:false,properties:{curso:{type:'string'},instituicao:{type:'string'},periodo:{type:'string'}},required:['curso','instituicao','periodo']}},
   conquistas:{type:'array',items:{type:'object',additionalProperties:false,properties:{titulo:{type:'string'},descricao:{type:'string'}},required:['titulo','descricao']}},
   competencias:{type:'array',items:{type:'string'}},
   idiomas:{type:'array',items:{type:'object',additionalProperties:false,properties:{idioma:{type:'string'},nivel:{type:'string'}},required:['idioma','nivel']}},
   premios:{type:'array',items:{type:'object',additionalProperties:false,properties:{titulo:{type:'string'},descricao:{type:'string'}},required:['titulo','descricao']}}
 }, required:['nome','headline','localizacao','telefone','email','linkedin','website','resumo','experiencias','educacao','conquistas','competencias','idiomas','premios'] } };
function applyImported(d){
 S.basics={ name:d.nome||'', headline:d.headline||'', location:d.localizacao||'', phone:d.telefone||'', email:d.email||'', linkedin:d.linkedin||'', website:d.website||'', photo:S.basics.photo||'', summary:d.resumo||'' };
 S.sections=[];
 if((d.experiencias||[]).length) S.sections.push({id:nid(),type:'experience',title:'Experiência',col:'main',items:d.experiencias.map(e=>({cargo:e.cargo,empresa:e.empresa,periodo:e.periodo,local:e.local,descricao:e.descricao}))});
 if((d.educacao||[]).length) S.sections.push({id:nid(),type:'education',title:'Educação',col:'main',items:d.educacao.map(e=>({cargo:e.curso,empresa:e.instituicao,periodo:e.periodo,local:'',descricao:''}))});
 if((d.conquistas||[]).length) S.sections.push({id:nid(),type:'achievements',title:'Conquistas-Chave',col:'side',items:d.conquistas});
 if((d.competencias||[]).length) S.sections.push({id:nid(),type:'skills',title:'Competências',col:'side',items:d.competencias});
 if((d.idiomas||[]).length) S.sections.push({id:nid(),type:'languages',title:'Idiomas',col:'side',items:d.idiomas});
 if((d.premios||[]).length) S.sections.push({id:nid(),type:'awards',title:'Prêmios',col:'side',items:d.premios.map(p=>({cargo:p.titulo,empresa:'',periodo:'',local:'',descricao:p.descricao}))});
 renderEditor(); renderPreview(); save();
}
